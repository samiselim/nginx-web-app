name: build-push
run-name: build and push docker image 

## Triggers 
on:
    workflow_dispatch:
        inputs:
            image-version:
                type: string
                required: true

jobs:
    build-push:
        runs-on: ubuntu-latest
        steps:
            - name: Cloning repositry
              uses: actions/checkout@v6

            - name: Login to Docker Hub
              uses: docker/login-action@v4
              with:
                username: samiselim
                password: ${{ secrets.DOCKER_CREDS }}

            - name: Build and push
              uses: docker/build-push-action@v7
              with:
                context: .
                push: true
                tags: samiselim/nginx-app:v1

